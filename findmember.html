<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coding Club | 지원자 명단 확인</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
        button { margin: 2px; padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
        button:hover { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>지원자 명단</h1>
    <table>
        <thead>
            <tr>
                <th>이름</th>
                <th>연락처</th>
                <th>경험</th>
                <th>지원동기</th>
            </tr>
        </thead>
        <tbody id="applicant-list">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9mCZ0eY5dOXg2HtU6Ksyc4k8_Vijmtsc",
        authDomain: "codingclub-join.firebaseapp.com",
        databaseURL: "https://codingclub-join-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "codingclub-join",
        storageBucket: "codingclub-join.firebasestorage.app",
        messagingSenderId: "940643433592",
        appId: "1:940643433592:web:65a0d2409228ff6996818d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const listContainer = document.getElementById('applicant-list');

    onValue(ref(db, 'applications'), (snapshot) => {
        const data = snapshot.val();
        listContainer.innerHTML = '';
        if (data) {
            Object.entries(data).forEach(([id, app]) => {
                const status = app.status || "대기중";
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${app.name}</td>
                    <td>${app.contact}</td>
                    <td>${status}</td>
                    <td>
                        <button onclick="updateStatus('${id}', '승인')">승인</button>
                        <button onclick="updateStatus('${id}', '보류')">보류</button>
                        <button onclick="updateStatus('${id}', '탈락')">탈락</button>
                        <button onclick="deleteApp('${id}')" style="color:red">X</button>
                    </td>
                `;
                listContainer.appendChild(row);
            });
        }
    });

    // 상태 업데이트 함수
    window.updateStatus = (id, newStatus) => {
        update(ref(db, `applications/${id}`), { status: newStatus });
    };

    // 삭제 함수
    window.deleteApp = (id) => {
        if(confirm("정말 삭제하시겠습니까?")) {
            remove(ref(db, `applications/${id}`));
        }
    };
</script>
</body>
</html>
