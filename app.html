<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Club | 지원하기</title>
    <style>
        :root {
            --brand-color: #0066ff;
            --bg-sub: #f4f7fa;
        }
        body { font-family: sans-serif; background-color: var(--bg-sub); padding: 20px; line-height: 1.6; }
        .form-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--brand-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="form-group">
            <a href="index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> <-- 홈페이지로 돌아가기
            </a>
        </div>
    </header>

<div class="form-container">
    <h1>Project Application</h1>
    <p>코딩 클럽에 합류하여 자신만의 세계를 구축해 보세요.</p>
    <form>
        <div class="form-group">
            <label>이름 (또는 닉네임) *</label>
            <input type="text" id="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
            <label>연락처 또는 이메일 *</label>
            <input type="text" id="contact" placeholder="010-0000-0000" required>
        </div>
        <div class="form-group">
            <label>현재 코딩 경험 *</label>
            <select id="experience" required>
                <option value="" disabled selected>선택해주세요</option>
                <option value="none">전혀 모름</option>
                <option value="beginner">기초 수준</option>
                <option value="no-code">노코드</option>
                <option value="intermediate">중급 수준</option>
                <option value="pro">고수 수준</option>
            </select>
        </div>
        <div class="form-group">
            <label>지원 동기 (선택)</label>
            <textarea id="motivation" placeholder="예: 게임을 직접 만들어보고 싶어서 지원했습니다."></textarea>
        </div>
        <button type="submit" class="submit-btn">지원서 제출하기</button>
    </form>
</div>

<script type="module">
  // 1. 필요한 모듈들 가져오기 (database 모듈 추가됨)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

  // 2. Firebase 설정 (databaseURL이 반드시 포함되어야 합니다)
const firebaseConfig = {
  apiKey: "AIzaSyC9mCZ0eY5dOXg2HtU6Ksyc4k8_Vijmtsc",
  authDomain: "codingclub-join.firebaseapp.com",
  // 리전 주소가 포함된 필수 설정입니다
  databaseURL: "https://codingclub-join-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "codingclub-join",
  storageBucket: "codingclub-join.firebasestorage.app",
  messagingSenderId: "940643433592",
  appId: "1:940643433592:web:65a0d2409228ff6996818d",
  measurementId: "G-PHB32W40K1"
};

  // 3. 초기화
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 4. 지원서 제출 로직 (이 부분은 이전 답변의 로직을 그대로 사용하면 됩니다)
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = {
      name: document.getElementById('name').value,
      contact: document.getElementById('contact').value,
      experience: document.getElementById('experience').value,
      motivation: document.getElementById('motivation').value,
      appliedAt: new Date().toISOString()
    };

    const newAppRef = push(ref(db, 'applications'));
    set(newAppRef, formData).then(() => {
        alert("성공적으로 제출되었습니다!");
        this.reset();
    });
  });
</script>

</body>
</html>
